name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  DATABASE_URL: file:./ci.sqlite
  APP_HOST: 127.0.0.1
  APP_PORT: "3000"
  AUDIT_PROVIDER: demo
  LOG_LEVEL: error
  DEMO_SEED: ci-foundation
  NEXT_TELEMETRY_DISABLED: "1"
  OPENAI_API_KEY: ""
  OPENAI_MODEL: ""

jobs:
  supply-chain:
    name: Secret and dependency vulnerability scans
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install checksum-verified Gitleaks 8.30.1
        shell: bash
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          release="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl --fail --silent --show-error --location --output "$RUNNER_TEMP/$archive" "$release/$archive"
          curl --fail --silent --show-error --location --output "$RUNNER_TEMP/$checksums" "$release/$checksums"
          grep "  $archive$" "$RUNNER_TEMP/$checksums" > "$RUNNER_TEMP/gitleaks-selected-checksum.txt"
          cd "$RUNNER_TEMP"
          sha256sum --check gitleaks-selected-checksum.txt
          mkdir --parents "$RUNNER_TEMP/gitleaks-bin"
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP/gitleaks-bin" gitleaks
          echo "$RUNNER_TEMP/gitleaks-bin" >> "$GITHUB_PATH"

      - name: Scan Git history with Gitleaks
        run: gitleaks git . --config .gitleaks.toml --log-opts="--all" --no-banner --redact --verbose

      - name: Scan the pinned dependency graph with OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  quality:
    name: Linux quality and Demo smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pinned Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm through Corepack
        run: |
          corepack enable
          pnpm --version

      - name: Locate pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm content-addressable store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run offline repository and secret guard
        run: pnpm guard:repository

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Apply committed migrations to clean SQLite
        run: pnpm db:migrate:deploy

      - name: Run keyless quality gates
        run: pnpm verify

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run keyless Demo browser smoke test
        run: pnpm test:e2e

  windows-smoke:
    name: Windows compatibility
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pinned Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm through Corepack
        shell: pwsh
        run: |
          corepack enable
          pnpm --version

      - name: Locate pnpm store
        id: pnpm-store
        shell: pwsh
        run: |
          $storePath = pnpm store path --silent
          "path=$storePath" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm content-addressable store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cross-platform repository guard
        run: pnpm guard:repository

      - name: Generate and validate Prisma client
        shell: pwsh
        run: |
          pnpm db:generate
          pnpm db:validate

      - name: Run strict type checking
        run: pnpm typecheck

      - name: Run keyless unit tests
        run: pnpm test:unit

      - name: Build production application
        run: pnpm build
